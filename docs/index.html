<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Mate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }
    .version-badge {
      display: inline-block;
      background: #1a1a2e;
      color: #7c8aff;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 2rem;
    }
    .primary-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      color: #0a0a0a;
      padding: 0.9rem 2rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 2rem;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
    }
    .primary-btn svg { width: 20px; height: 20px; }
    .other-downloads {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .other-downloads a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .other-downloads a:hover {
      border-color: #555;
      color: #ccc;
    }
    .loading { color: #555; font-size: 0.9rem; }
    .footer {
      margin-top: 3rem;
      color: #444;
      font-size: 0.8rem;
    }
    .footer a { color: #666; text-decoration: none; }
    .footer a:hover { color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mate</h1>
    <p class="subtitle">Your AI-powered terminal companion</p>
    <div id="version" class="version-badge" style="display:none;"></div>
    <div id="content">
      <p class="loading">Loading latest release...</p>
    </div>
    <div class="footer">
      <a href="https://github.com/mqtik/mate-releases/releases">All releases</a>
    </div>
  </div>

  <script>
    const REPO = 'mqtik/mate-releases';
    const API = `https://api.github.com/repos/${REPO}/releases/latest`;

    const PLATFORMS = {
      macos:   { label: 'macOS',   icon: '&#63743;', pattern: /macos.*\.dmg$/i },
      windows: { label: 'Windows', icon: '&#8862;',  pattern: /windows.*\.zip$/i },
      linux:   { label: 'Linux',   icon: '&#9881;',  pattern: /linux.*\.tar\.gz$/i },
    };

    function detectOS() {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('mac')) return 'macos';
      if (ua.includes('win')) return 'windows';
      if (ua.includes('linux')) return 'linux';
      return 'macos';
    }

    async function load() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error('No releases yet');
        const data = await res.json();

        const version = data.tag_name;
        const versionEl = document.getElementById('version');
        versionEl.textContent = version;
        versionEl.style.display = 'inline-block';

        const os = detectOS();
        const assets = {};
        for (const [key, cfg] of Object.entries(PLATFORMS)) {
          const asset = data.assets.find(a => cfg.pattern.test(a.name));
          if (asset) assets[key] = asset.browser_download_url;
        }

        let html = '';
        if (assets[os]) {
          html += `<a class="primary-btn" href="${assets[os]}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/></svg>
            Download for ${PLATFORMS[os].label}
          </a><br>`;
        }

        const others = Object.entries(assets).filter(([k]) => k !== os);
        if (others.length > 0) {
          html += '<div class="other-downloads">';
          for (const [key, url] of others) {
            html += `<a href="${url}">${PLATFORMS[key].label}</a>`;
          }
          html += '</div>';
        }

        document.getElementById('content').innerHTML = html || '<p class="loading">No desktop assets found in latest release.</p>';
      } catch (e) {
        document.getElementById('content').innerHTML =
          `<p class="loading">No releases available yet. Check back soon.</p>
           <br><div class="other-downloads"><a href="https://github.com/${REPO}/releases">View all releases</a></div>`;
      }
    }

    load();
  </script>
</body>
</html>
